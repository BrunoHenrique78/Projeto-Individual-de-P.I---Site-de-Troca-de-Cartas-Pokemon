<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/Logo do Projeto Individual.ico" />
</head>

<body>

  <!--PARTE SUPERIOR DO SITE (ONDE FICA O NOME) -->

  <div class="parte_superior">

    <img src="./assets/icon/Logo do Projeto Individual.png" alt="Logo">

    <div class="itens_superior">
        
        <li><a href="index.html" class="botao_cl_inicio">Início</a></li>

    </div>

  </div>
  <!--header fim-->

  <div class="login">
    
    <div class="fundo">
  <div class="card">

    <h2 class="titulo">Bem-vindo Novo Treinador!</h2>

        <div class="informacoes">
          <div class="info">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>

          <div class="info">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="PokeSwap@provedor.com" />
          </div>

          <div class="info">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>

          <div class="info">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>

          <div class="info">
            <span>País:</span>
            <input id="pais_input" type="text" placeholder="Brasil" />
          </div>

          <div class="info">
            <span>Estado:</span>
            <input id="estado_input" type="text" placeholder="São Paulo" />
          </div>

          <p></p>

          <button class="botao" onclick="cadastrar()">Registrar</button>
        </div>

<p></p>

        <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

        <p></p>

        <div class="info">
            <span>Já tem conta?</span>
            <br>
            <a href="login.html">Login</a>
        </div>

      </div>
  </div>    
</div>
  </div>

</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 


  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var paisVar = pais_input.value;
    var estadoVar = estado_input.value;


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      paisVar == "" ||
      estadoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        paisServer: paisVar,
        estadoServer: estadoVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
