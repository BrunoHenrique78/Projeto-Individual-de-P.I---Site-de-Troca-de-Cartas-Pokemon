<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/Logo do Projeto Individual.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeSwap | Álbum de Cartas</title>

    
    <link rel="stylesheet" href="./../css/estilo_cadastro_carta.css">

</head>
<body>

    <div class="cadastro_carta">

        <div class="navbar_esquerda">

    <img src="../assets/icon/Logo do Projeto Individual.png" alt="Logo">

            <div class="itens_navbar_esquerda">

                <li>
                    <a href="../index.html">🏠 Início</a>
                </li>

                <li>
                    <a href="dashboard.html">📊 Dashboard</a>
                </li>

                <li>
                    <a href="cadastro_carta.html">➕ Registro de Cartas</a>
                </li>

                <li>
                    <a href="album_carta.html">🃏 Álbum de Cartas</a>
                </li>

                <li>
                    <a href="cartas_geral.html">💱 Cartas Gerais</a>
                </li>

            </div>

        </div>

        <div class="conteudo_cadastro_carta">

            <h1 class="titulo_cadastro_carta">Bem-vindo ao seu Albúm de Cartas Pokémon!</h1>

                <div class="painel_cadastro_carta">

                    <div class="barra_pesquisa"></div>

                    <div id="div_resultado"></div>

                </div>

        </div>

    </div>


<div id="modal" class="modal">

    <div class="modal-box1">

        <span onclick="fecharModal()" class="fechar-modal">❌</span>

        <div class="modal-imagem">
            <img id="modal-img" width="200">
        </div>

        <div class="modal-info1">
            <h2 id="modal-nome"></h2>
            <p id="modal-tipo"></p>
            <p id="modal-raridade"></p>

            <button onclick="mostrarInput()">Vender / Trocar</button>

            <div id="area-input" style="display:none; margin-top:10px;">
                <textarea id="ipt_descricao" placeholder="Descrição da carta"></textarea>
                <button onclick="acao()">Confirmar</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
<script>

let cartaSelecionada = null;

fetch(`/cartas/listar/${sessionStorage.ID_USUARIO}`)
.then(res => res.json())
.then(cartas => {

    div_resultado.innerHTML = "";

    cartas.forEach(carta => {
        div_resultado.innerHTML += `<div class="card_carta" onclick="abrirModal('${carta.id_carta}', '${carta.carta_nome}', '${carta.carta_imagem}', '${carta.carta_tipo}', '${carta.carta_raridade}')">
                <img src="${carta.carta_imagem}">
            </div>
        `;
    });

});

function abrirModal(id, nome, imagem, tipo, raridade) {

    cartaSelecionada = id;

    document.getElementById("modal").classList.add("ativo");

    document.getElementById("modal-nome").innerText = nome;
    document.getElementById("modal-img").src = imagem;
    document.getElementById("modal-tipo").innerText = "Tipo: " + tipo;
    document.getElementById("modal-raridade").innerText = "Raridade: " + raridade;

    document.getElementById("area-input").style.display = "none";
}

function fecharModal() {
    document.getElementById("modal").classList.remove("ativo");
}

function mostrarInput() {
    document.getElementById("area-input").style.display = "block";
}

function acao() {

    fetch(`/cartas/publicar/${cartaSelecionada}/${sessionStorage.ID_USUARIO}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            descricao: document.getElementById("ipt_descricao").value
        })
    })
    .then(() => {
        alert("Carta publicada nas gerais!");
        fecharModal();
    });

}

</script>
