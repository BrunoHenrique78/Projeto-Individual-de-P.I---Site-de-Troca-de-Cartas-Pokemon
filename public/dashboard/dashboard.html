<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/Logo do Projeto Individual.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeSwap | Dashboards</title>

    
    <link rel="stylesheet" href="./../css/dashboards.css">
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="pagina_dash">

  <div class="navbar_esquerda">

    <img src="../assets/icon/Logo do Projeto Individual.png" alt="Logo">

    <div class="itens_navbar_esquerda">

        <li>
            <a href="../index.html">🏠 Início</a>
        </li>

        <li>
            <a href="dashboard.html">📊 Dashboard</a>
        </li>

        <li>
            <a href="cadastro_carta.html">➕ Registro de Cartas</a>
        </li>

        <li>
            <a href="album_carta.html">🃏 Álbum de Cartas</a>
        </li>

    </div>

  </div>

<div class="conteudo_dashboard">

    <h1 class="titulo_dash" id="titulo">Bem-vindo!</h1>

    <div class="painel_dashboard">

        <div class="KPI">

            <div class="KPI_ajuste">

                <div class="KPI1_dash">
                    Total de Cartas Registradas:
                    <p></p>
                    <span id="kpi_total">0</span>
                </div>

                <div class="KPI2_dash">
                    Última carta cadastrada:
                    <p></p>
                    <span id="kpi_ultima">--/--/---- --:--</span>
                </div>

                <div class="KPI3_dash">
                    Cartas repetidas:
                    <p></p>
                    <span id="kpi_repetidas">0</span>
                </div>

            </div>

            <div class="grafico_de_barras1">
                <canvas id="graficoBarras1"></canvas>
            </div>

            <div class="grafico_de_barras2">
                <canvas id="graficoBarras2"></canvas>
            </div>

        </div>

    </div>

</div>


</body>

</html>

<script>

let nome = sessionStorage.NOME_USUARIO;

document.getElementById("titulo").innerHTML = `Bem-vindo ${nome}!`;

fetch("/cartas/total-cartas")
  .then(res => res.json())
  .then(data => {
      document.getElementById("kpi_total").innerHTML = `${data[0].total} Carta(s)`;
});    

fetch(`/cartas/ultima-carta/${sessionStorage.ID_USUARIO}`)
.then(res => res.json())
.then(resultado => {
    document.getElementById("kpi_ultima").innerHTML = `${resultado[0].ultima ?? '--/--/---- --:--'}`;
});

fetch(`/cartas/cartas-repetidas/${sessionStorage.ID_USUARIO}`)
  .then(res => res.json())
  .then(data => {
      document.getElementById("kpi_repetidas").innerHTML = `${data[0].repetidas ?? 0} Carta(s)`;
  });

fetch("/cartas/tipos-cartas")
  .then(res => res.json())
  .then(dados => {

      var labels = dados.map(i => i.carta_tipo);
      var valores = dados.map(i => i.quantidade);

      new Chart(document.getElementById("graficoBarras1"), {
          type: "bar",
          data: {
              labels: labels,
              datasets: [{
                  data: valores
              }]
          }
      });

  });

fetch("/cartas/raridade-cartas")
  .then(res => res.json())
  .then(dados => {

      const labels = dados.map(i => i.carta_raridade);
      const valores = dados.map(i => i.quantidade);

      new Chart(document.getElementById("graficoBarras2"), {
          type: "pie",

          data: {
              labels: labels,

              datasets: [{
                  data: valores
              }]
          }
      });

  });
</script>
