<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PokeSwap | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/Logo do Projeto Individual.ico">
</head>

<body>

    <!--Header-->

  <div class="parte_superior">

    <img src="./assets/icon/Logo do Projeto Individual.png" alt="Logo">

    <div class="itens_superior">
        
      <li><a href="index.html" class="botao_cl_inicio">Início</a></li>

    </div>

  </div>

<div class="fundo">

  <div class="card">
    <h2 class="titulo">Bem-vindo de Volta Treinador!</h2>

        <div class="informacoes">

          <div class="info">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="PokeSwap@provedor.com" />
          </div>

          <div class="info">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>

          <p></p>

          <button class="botao" onclick="entrar()">Entrar</button> 
        </div>
        
<p></p>

              <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <p></p>
        
        <div class="info">
            <span>Não tem conta? </span>
            <br>
            <a href="cadastro.html">Se Inscreva</a>
          </div>


      </div>
  </div>    
</div>

</div>


                <div id="div_erros_login"></div>

    </div>

</body>

</html>

<script>


    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id_usuario;

                    setTimeout(function () {
                        window.location = "./dashboard/dashboard.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
