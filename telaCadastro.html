<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PokéSwap | Cadastro</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    
<!--PARTE SUPERIOR DO SITE (ONDE FICA O NOME) -->

  <div class="parte_superior">

    <img src="Logo do Projeto Individual.png" alt="Logo">

    <div class="itens_superior">
        
        <img src="icone_voltar.png"><li><a href="index.html">Início</a></li>

    </div>

  </div>


<!--PARTE DO QUADRADO CADASTRO -->

<div class="fundo">
  <div class="card">

    <h2 class="titulo">Bem-vindo Novo Treinador!</h2>

        <div class="informacoes">
          <div class="info">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>

          <div class="info">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="PokeSwap@provedor.com" />
          </div>

          <div class="info">
            <span>CPF:</span>
            <input id="cpf_input" type="text" placeholder="***********" />
          </div>

          <div class="info">
            <span>Senha:</span>
            <input id="senha_input" type="text" placeholder="******" />
          </div>

          <div class="info">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="text" placeholder="******" />
          </div>

          <p></p>

          <button class="botao" onclick="registrar()">Registrar</button>
        </div>

        <p></p>

        <div class="info">
            <span>Já tem conta?</span><a href="login.html">Login</a>
          </div>


      </div>
  </div>    
</div>

  <div id="div_alert"></div>

</body>
</html>
<script>

let vetor_nome = []
let vetor_email = [];
let vetor_cpf = [];
let vetor_senha = [];
let vetor_conf_senha = [];

function registrar(){

div_alert.innerHTML = "";

let nome = nome_input.value;
let email = email_input.value;
let cpf = cpf_input.value;
let senha = senha_input.value;
let conf_senha = confirmacao_senha_input.value;



  if(nome == "" || email == "" || cpf == "" || senha == "" || conf_senha == ""){
    div_alert.innerHTML = `Preencha todos os campos necessários para o registro Treinador!`;

    return;
  }

  let temArroba = 0;
  let temPonto = 0;

  for(let i = 0; i < email.length; i++){
    if(email[i] == "@"){
        temArroba++;
    }
    if(email[i] == "."){
        temPonto++;
    }
  }

  if(temArroba == 0 || temPonto == 0){
    div_alert.innerHTML = `E-mail inválido!`;
    return;
  }

  let tamanhoCpf = 0;

  for(let i = 0; i < cpf.length; i++){
    tamanhoCpf++;
  }

  if(tamanhoCpf != 11){
    div_alert.innerHTML = `CPF deve ter 11 números! (Somente números)`;
    return;
  }


  vetor_senha = [];
  vetor_conf_senha = [];

  vetor_senha.push(senha);
  vetor_conf_senha.push(conf_senha);

  for(let i = 0; i < vetor_senha.length; i++){
    if(vetor_senha[i] != vetor_conf_senha[i]){
        div_alert.innerHTML = `As senhas não coincidem!`;
        return;
    }
  }

  for(let i = 0; i < vetor_email.length; i++){
    if(email == vetor_email[i]){
        div_alert.innerHTML = `E-mail já cadastrado!`;
        return;
    }
  }

  for(let i = 0; i < vetor_cpf.length; i++){
    if(cpf == vetor_cpf[i]){
        div_alert.innerHTML = `CPF já cadastrado!`;
        return;
    }
  }

vetor_email.push(email);
vetor_cpf.push(cpf);

div_alert.innerHTML = `Cadastro realizado com sucesso!`;

}


</script>
