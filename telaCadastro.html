<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PokéSwap | Cadastro</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    
<!--PARTE SUPERIOR DO SITE (ONDE FICA O NOME) -->

  <div class="parte_superior">

    <img src="Logo do Projeto Individual.png" alt="Logo">

    <div class="itens_superior">
        
        <li><a href="site.html">Home</a></li>

        <li><a href="telaLogin.html">Login</a></li>
        
        <li class="agora"><a href="telaCadastro.html">Cadastro</a></li>

    </div>

  </div>


<!--PARTE DO QUADRADO CADASTRO -->

<div class="fundo">
  <div class="card">

    <h2 class="titulo">Bem-vindo Novo Treinador!</h2>

        <div class="informacoes">
          <div class="info">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>

          <div class="info">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="PokeSwap@provedor.com" />
          </div>

          <div class="info">
            <span>CPF:</span>
            <input id="cpf_input" type="text" placeholder="***********" />
          </div>

          <div class="info">
            <span>Senha:</span>
            <input id="senha_input" type="text" placeholder="******" />
          </div>

          <div class="info">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="text" placeholder="******" />
          </div>

          <button class="botao" onclick="registrar()">Registrar</button>
        </div>

      </div>
  </div>    
</div>

  <div id="div_alert"></div>

</body>
</html>
<script>

function registrar(){

div_alert = "";

let nome = nome_input.value;
let email = email_input.value;
let cpf = cpf_input.value;
let senha = senha_input.value;
let conf_senha = confirmacao_senha_input.value;

  if(nome == "" || email == "" || cpf == "" || senha == "" || conf_senha == ""){
    div_alert.innerHTML = `Preencha todos os campos necessários para o registro Treinador!`
  }
}


</script>
